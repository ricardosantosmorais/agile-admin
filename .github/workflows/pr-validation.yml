name: PR Validation

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    name: Lint, Typecheck and Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    needs: quality
    permissions:
      contents: read
      pull-requests: write
    env:
      CI: 'true'
      NEXT_TELEMETRY_DISABLED: '1'
      PLAYWRIGHT_AUTH_EMAIL: ${{ secrets.PLAYWRIGHT_AUTH_EMAIL }}
      PLAYWRIGHT_AUTH_PASSWORD: ${{ secrets.PLAYWRIGHT_AUTH_PASSWORD }}
      PLAYWRIGHT_AUTH_CODE: ${{ secrets.PLAYWRIGHT_AUTH_CODE }}
      PLAYWRIGHT_AUTH_TENANT_ID: ${{ secrets.PLAYWRIGHT_AUTH_TENANT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run Playwright
        run: npx playwright test

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts-${{ github.run_id }}
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
          retention-days: 14

      - name: Append job summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Playwright artifacts"
            echo ""
            echo "- Job: \`Playwright E2E\`"
            echo "- Traces, screenshots and HTML report were uploaded as workflow artifacts."
            echo "- Artifact name: \`playwright-artifacts-${{ github.run_id }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
